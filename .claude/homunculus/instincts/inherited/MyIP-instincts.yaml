# MyIP Workflow Add Or Enhance Api Endpoint

## Action

Follow the add-or-enhance-api-endpoint workflow:
1. Create or update api/handler.js for the new endpoint
2. Modify backend-server.js to register the new route or middleware
3. Update or create documentation in api/AGENTS.md (and/or AGENTS.md)
4. If needed, update .env.example for new environment variables
5. Update frontend components to consume the new endpoint
6. Update frontend/data/changelog.json and package.json version

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: api/*.js, backend-server.js, api/AGENTS.md

